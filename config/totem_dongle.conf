# Prospector dongle config
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_BATTERY_REPORTING=n

# Display
CONFIG_ZMK_DISPLAY=y

# Status screen - pick ONE (or omit for Classic default)
# CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
# Disable ambient light sensor
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
# Customization

# Central role - dongle handles this in a dongle setup
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=5
